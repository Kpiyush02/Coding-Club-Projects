<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application form</title>
</head>
<body>
    <!-- Heaader -->
    <header> 
        <h1 style="text-align: center;">Job Application Form</h1>
       <marquee direction="right" scrollamount="20"><h2> !!We Are Hiring !!</h2></marquee> 
    </header>

     <!-- form -->
     <form>
        <!-- Personal Information -->
<fieldset>
    <legend>Personal Information</legend>
    <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Piyush Patel" required>
    <br><br>

    <label for="emai"l> Email:</label>
    <input type="email" id="email" placeholder="example@gmail.com">
    <br><br>

    <label for="number">Phone Number:</label>
    <input type="tel" id="number" placeholder="94XXXXXX69">
    <br><br>

    <label for="dob">DOB:</label>
    <input type="date" id="dob">
     <br><br>

    <button>Submit</button>
   </fieldset>
   <br>
    
    <!-- Genderr Information -->
 <fieldset>
            <legend>Gender Information</legend>
            <label for="male">Male:</label>
            <input type="radio" name="gender" id="Male">
            <br>

            <label for="female">Female:</label>
            <input type="radio" name="gender" id="female">
            <br>

             <label for="Other">Other:</label>
            <input type="radio" name="gender" id="Other">
          </fieldset>
         <br>

         <!-- Skills -->
          <fieldset>
            <legend>Skills</legend>
            <input type="checkbox" id="mern">
            <label for="MERN"> MERN</label>
            <br>
            <input type="checkbox" id="ai_developer">
            <label for="data"> Ai_DEVELOPER</label>
            <br>
            <input type="checkbox" id="Data analyst">
            <label for="data"> DATA ANALYST</label>
            <br>
            <input type="checkbox" id="Cloud Enginner">
            <label for="cloud">CLOUD ENGINNER</label>
    
          </fieldset>
          <br>
          <!-- Additional Information-->
           <fieldset>
    <legend>Additional Information</legend>

    <!-- Experience -->
    <label for="experience">Years Of Experience</label>

    <select id="experience">
        <option disabled selected>Select Year</option>
        <option>Fresher</option>
        <option>1 Year</option>
        <option>2 Year</option>
        <option>3+ Year</option>
    </select>

    <br><br>

    <!-- Location -->
    <label for="location">Preferred Location</label>

    <select id="location">
        <option disabled selected>Select Location</option>
        <option>BR</option>
        <option>UP</option>
        <option>MP</option>
        <option>JH</option>
    </select>
    <br><br>
    <!-- Upload Resume -->
     <label for="=resume">Upload Resume:</label>
     <input type="file" id="resume" maxlength="10MB" accept=".pdf,.html">
 
</fieldset>
<br><br>
<button type="submit">Submit</button>
<button type="reset">Reset</button>
     </form>
</body>
</html>
