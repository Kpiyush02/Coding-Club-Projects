<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Success Journey</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f4f4f4;
}

.main{
    width:80%;
    padding:40px;
    border:5px solid black;
    background-color:rgb(250,220,119);

    display:flex;
    flex-wrap:wrap;
    gap:30px;
    justify-content:center;
    align-items:flex-start;
}

.main div{
    width:180px;
    height:180px;
    border:4px solid red;
    border-radius:10px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:24px;
    font-weight:bold;
    color:white;
    text-shadow:2px 2px 5px black;

    background-size:cover;
    background-position:center;
}

#item1{
    background-image:url('https://images.unsplash.com/photo-1496171367470-9ed9a91ea931?w=500');
}

#item2{
    background-image:url('https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=500');
    margin-top:60px;
}

#item3{
    background-image:url('https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=500');
    margin-top:120px;
}

#item4{
    background-image:url('https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=500');
    margin-top:180px;
}

#item5{
    background-image:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=500');
    margin-top:240px;
}

</style>
</head>

<body>

<div class="main">
    <div id="item1">Success 🤩</div>
    <div id="item2">Action 🎬</div>
    <div id="item3">Plan 🤔</div>
    <div id="item4">Goal 🎯</div>
    <div id="item5">Start 😊</div>
</div>

</body>
</html>
